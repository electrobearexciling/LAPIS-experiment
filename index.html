	  <body>
	  <div id='subject-input-overlay' style='
	    position:fixed;top:0;left:0;width:100%;height:100%;
	    background:#fff;z-index:9999;display:flex;
	    align-items:center;justify-content:center;
	  '>
	    <div style='text-align:center;padding:50px;max-width:500px;'>
	      <h2>请输入您的被试号</h2>
	      <p>请根据实验分配，输入您的被试编号（1-733）。</p>
	      <div style='margin:30px auto;max-width:300px;'>
	        <input type='text' id='subject_id_input' style='
	          width:100%;padding:10px;font-size:18px;text-align:center;
	          border:2px solid #ccc;border-radius:5px;
	        ' placeholder='请输入被试号'>
	      </div>
	      <button onclick='handleSubjectSubmit()' style='
	        padding:12px 40px;font-size:16px;cursor:pointer;
	        background:#4a90d9;color:#fff;border:none;border-radius:5px;
	      '>确认并继续</button>
	      <p style='color:#666;font-size:14px;margin-top:15px;'>示例: 1, 2, 3, ...</p>
	    </div>
	  </div>
	</body>
	  <script>
	    /******************************************************************
	     *
	     * 数据传输函数（当前仅本地保存）
	     *
	     ******************************************************************/
	    /* 初始化 jsPsych */
	    var jsPsych = initJsPsych({
	        show_progress_bar: true,
	        on_interaction_data_update: function(data) {
	          exp_interaction.push(data);
	        },
	    });
	    var timeline = [];
	    var exp_interaction = [];
	    let study_id = jsPsych.data.urlVariables()['study_id']
	    let session_id = jsPsych.data.urlVariables()['session_id']
	    var subject_id = null;
	    var stimuli = [];
	    var images_to_load = [];
	    var is_loaded = false;
	    function getScreenColorGamut() {
	        if (window.matchMedia("(color-gamut: rec2020)").matches) {
	            return "rec2020";
	        } else if (window.matchMedia("(color-gamut: p3)").matches) {
	            return "p3";
	        } else if (window.matchMedia("(color-gamut: srgb)").matches) {
	            return "srgb";
	        } else {
	            return "unknown";
	        }
	    }
	    const experiment_start = new Date();
	    function toBeijingISOString(d) {
	        var utcMs = d.getTime();
	        var beijingMs = utcMs + 8 * 3600000;
	        var bj = new Date(beijingMs);
	        return bj.toISOString().replace('Z', '+08:00');
	    }
	    jsPsych.data.addProperties({
	        study_id: study_id,
	        session_id: session_id,
	        start_date: experiment_start.toLocaleDateString(),
	        start_time: experiment_start.toLocaleTimeString(),
	        start_iso: toBeijingISOString(experiment_start),
	        color_gamut: getScreenColorGamut()
	    });
	    /***************************************
	    * 从JS对象加载图片
	    ***************************************/
	    function handleSubjectSubmit() {
	      var input = document.getElementById("subject_id_input");
	      var value = input ? input.value.trim() : "";
	      if (value === "") {
	        alert("请输入有效的被试号！");
	        return;
	      }
	      subject_id = value;
	      var experiment_start = new Date();
	      jsPsych.data.addProperties({
	        entered_subject_id: subject_id,
	        start_date: experiment_start.toLocaleDateString(),
	        start_time: experiment_start.toLocaleTimeString(),
	        start_iso: toBeijingISOString(experiment_start)
	      });
	      document.getElementById("subject-input-overlay").style.display = "none";
	      loadImagesFromJS(subject_id);
	    }
	    function loadImagesFromJS(input_subject_id) {
	        console.log("开始加载图片，被试号:", input_subject_id);
	        console.log("assignmentData:", assignmentData);
	        // 检查 assignmentData 是否存在
	        if (typeof assignmentData === 'undefined') {
	            alert("无法加载图片分配数据(assignment.js)，请确保该文件存在于实验目录中。");
	            setTimeout(function() {
	                document.getElementById('subject-input-overlay').style.display = 'flex';
	            }, 100);
	            return;
	        }
	        // 获取对应被试号的图片列表
	        // 取所有图片
        var image_filenames = assignmentData[input_subject_id.toString()].slice(0, 480);
	        if (!image_filenames) {
	            alert("未找到被试号 " + input_subject_id + " 的图片分配信息。\n请确认被试号在1-733之间。");
	            setTimeout(function() {
	                document.getElementById('subject-input-overlay').style.display = 'flex';
	            }, 100);
	            return;
	        }
	        if (image_filenames.length === 0) {
	            alert("被试号 " + input_subject_id + " 没有分配任何图片。");
	            setTimeout(function() {
	                document.getElementById('subject-input-overlay').style.display = 'flex';
	            }, 100);
	            return;
	        }
	        console.log("找到被试 " + input_subject_id + " 的 " + image_filenames.length + " 张图片");
	        console.log("前5张图片:", image_filenames.slice(0, 5));
	        // 构建stimuli数组
	        stimuli = image_filenames.map(function(filename) {
	            var imageId = filename.replace('LAPIS_', '').replace('.jpg', '');
	            return {
	                stimuli: 'LAPIS_images/' + filename,
	                filename: filename,
	                image_id: imageId
	            };
	        });
	        // 构建预加载列表
	        images_to_load = image_filenames.map(function(filename) {
	            return 'LAPIS_images/' + filename;
	        });
	        is_loaded = true;
	        console.log("已加载 " + stimuli.length + " 张图片");
	        jsPsych.data.addProperties({
	            total_images: stimuli.length
	        });
	        // 继续实验
	        continueExperimentAfterLoad();
	    }
	    /***************************************
	    * 加载完成后继续实验
	    ***************************************/
	    function continueExperimentAfterLoad() {
	        try {
	            buildAndRunFullExperiment();
	        } catch (e) {
	            console.error("实验构建失败:", e);
	            document.body.innerHTML = '<div style="text-align:center;padding:50px;">' +
	                '<h2>实验加载失败</h2>' +
	                '<p>错误信息: ' + e.message + '</p>' +
	                '<button onclick="location.reload()" style="padding:10px 30px;font-size:16px;cursor:pointer;">重新开始</button>' +
	                '</div>';
	        }
	    }
	    /***************************************
	    * 欢迎界面
	    ***************************************/
	    var welcome = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus:  `
	          <p>在本实验中，您将看到艺术作品的图像。</p>
	          <p>您需要判断所展示的图像在美学上对您来说有多吸引人。</p>
	          <p>在实际实验开始之前，您需要填写一些关于性别、年龄和国籍的问题。</p>
	          <p>主要实验结束后，您还将完成两个关于艺术和美学体验的简短测试。</p>
	          <p>这些信息将与您在实验中的偏好相关联。</p> 
	          <p>除了您提供的个人信息外，您的参与是匿名的。</p>
	          `,
	        choices: ["继续"],
	        data: {
	            test_part: 'welcome'
	        } 
	    };
	    /***************************************
	    * 知情同意书
	    ***************************************/
	    var consent = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus:  `
	          <style>
	              .accept-consent-button{
	                  padding: 6px 12px;
	                  border-radius:4px;
	                  font-size:16px;
	                  background-color: #5cb85c;
	                  border-color: #4cae4c;
	                  color: #fff;
	                  cursor: pointer;
	              }
	              .accept-consent-button:hover{
	                  cursor:pointer;
	                  background-color: #4cae4c;;
	              }
	              .consent{
	                  font-size: 14px;
	                  margin-left: 10%;
	                  margin-right: 10%;
	              }
	              ul{
	                  text-align: left;
	                  padding-left: 20px;
	              }
	              li{
	                  margin-top:0.5em;
	              }
	              h5{
	                  margin-bottom: 1px;
	                  margin-top: 3px;
	                  font-size: 16px;
	              }
	              p{
	                  margin-top: 10px;
	              }
	              .informedConsent{
	                  padding-top: 2em;
	                  padding-bottom: 4em;
	                  margin-left: 5%;
	                  margin-right: 5%;
	              }
	              @media only screen and (min-width: 768px) {
	                  .informedConsent {
	                      padding-top: 2em;
	                      padding-bottom: 4em;
	                      margin-left: 10%;
	                      margin-right: 10%;
	                  }
	              }
	              @media only screen and (min-width: 1400px) {
	                  .informedConsent {
	                      padding-top: 2em;
	                      padding-bottom: 4em;
	                      margin-left: 20%;
	                      margin-right: 20%;
	                  }
	              }
	          </style>
	          <div class="consent">
	              <img style="width: 150px;" src="img/zjulogo.jpg">
	              <h5>研究标题</h5>
	              <p>艺术作品美学价值评分</p>
	              <h5>研究负责人及联系方式：</h5>
	              <p>Dr. Chenxiao Guan (chenxiaoguan@zju.edu.cn),
	              </p>
	              <h5>研究目的与方法</h5>
	              本研究将通过在线方式收集对艺术作品的美学反应。此外，参与者需要提供一些人口统计信息，如年龄、教育水平和艺术经验。这些人口统计变量将帮助我们了解特定群体的审美偏好。
	              <h5>实验时长</h5>
	              整个实验包括两个主要的试次块，以及前后的附加问题和测试，预计耗时不超过1小时。
	              <ul>
	                  <li>我了解本实验对我的要求。</li>
	                  <li>我知道我将参与以下试次或测试：
	                      <p>一项在线研究，您需要提供（非敏感）人口统计信息，如年龄、性别、国籍、教育水平和艺术经验。在正式实验中，您将对屏幕上显示的图像进行美学评分。</p>
	                  </li>
	                  <li>我知道参与的风险和不适感是有限的
	                      <li>心理美学领域（理解驱动审美欣赏的因素）将从本研究中受益，因为它提供了一个包含不同个体审美评分及其人口统计信息的大型（匿名）数据集。
	                          其他与审美欣赏相关的研究也可能从中受益。
	                          参与者将有机会欣赏和评分艺术作品，并获得相应的报酬。
	                      </li>
	                  </li>
	                  <li>我知道参与研究将获得奖励或报酬<br>
	                    参与者将获得完整的实验报酬。
	                  </li>
	                  <li>我理解参与本研究是自愿的。我有权随时退出。我不需要提供理由，并且知道这不会对我产生任何负面影响。</li>
	                  <li>本研究的结果可用于科学目的并可能发表。我的姓名不会被发表。数据的匿名性和保密性将在研究的所有阶段得到保护。</li>
	                  <li>如有问题或在参与后行使我的权利（访问我的数据、更正数据等），我知道可以联系：
	                      <ul>
	                          <li>chenxiaoguan@zju.edu.cn </li>
	                      </ul>
	                  </li>
	              </ul>
	              <p><b>我已阅读并理解本文档中的信息，并且有关本研究的疑问已得到解答。点击下方按钮，表示我同意参与。</b></p>
	          </div>
	          `,
	        choices: ["接受知情同意"],
	        button_html: function(choice, choice_index) {
	          return `<button class="jspsych-btn accept-consent-button" id="${choice_index}">${choice}</button>`;
	        },
	        data: {
	            test_part: 'consent'
	        } 
	    };
	    /***************************************
	    * 浏览器兼容性检查
	    ***************************************/
	    var browsercheck = {
	        type: jsPsychBrowserCheck,
	        minimum_width: 1200,
	        minimum_height: 700,
        allow_window_resize_message: "<p>您的浏视器口太小，无法完成本实验。</p><p>请将浏视器口最大化。</p>",
	        inclusion_function: (data) => {
	          return data.mobile === false
	        },
	        exclusion_message: (data) => {
	          if(data.mobile){
	            return '<p>请使用台式机或笔记本电脑参与本实验。</p>';
	          } 
	        }
	    };
	    /***************************************
	    * 预加载图片
	    ***************************************/
	    function createPreloadBlock() {
	        return {
	            type: jsPsychPreload,
	            message: '请等待实验加载。这可能需要几分钟时间。',
	            show_progress_bar: false,
				continue_after_error: true,
	            images: [
	              'img/zjulogo.jpg',
	              ...images_to_load
	            ],
	            data: {
	                test_part: 'preload'
	            }
	        };
	    }
	    let preload_images = createPreloadBlock();
	    /***************************************
	    * 人口统计信息调查
	    ***************************************/
	    DEMOGRAPHICS.language = 'zh';
	    DEMOGRAPHICS.components = ["introduction", "age", "gender", "province", "native_language", "education", "current_occupation", "visual_impairments", "art_history_education", "art_restoration"];
	    /***************************************
	    * 全屏相关试次
	    ***************************************/
	    const enter_fullscreen = {
	      type: jsPsychFullscreen,      
	      button_label: '继续',
	      message: '点击下方按钮后，实验将切换至全屏模式。</br></br>',
	      fullscreen_mode: true,
	      data: {
	        test_part: 'instructions'
	      }
	    }
	    const exit_fullscreen = {
	        type: jsPsychFullscreen,
	        fullscreen_mode: false,
	        delay_after: 0,
	        data: {
	            test_part: 'endfullscreen'
	        }
	    }
	    /***************************************
	    * 屏幕尺寸校准
	    ***************************************/
	    var resize = {
	      type: jsPsychResize,
	      button_label: '我确认上方框的大小与我的实体卡大小一致。',
	      item_width: 3 + 3/8,
	      item_height: 2 + 1/8,
	      prompt: "<p style='word-wrap: break-word; width: 900px; text-align: center; float: center; font-size: .9em;'>" +
	              "在开始之前，确定您屏幕的像素尺寸非常重要。</br>" +
	              "<b>请拿出您的学生卡、身份证或银行卡，将其贴在屏幕上。</b> </br>" +
	              " <font color='#0d6efd'><b>点击并拖动上方框的右下角，直到该框与您贴在屏幕上的卡片大小一致。</b></br>" +
	              "<b>请仔细操作，因为一旦进入下一页，您将无法返回此页面。</b></font></p></br>",
	      pixels_per_unit: 100,
	      starting_size: 376,
	      data : {
	          test_part: 'resize'
	      }
	    };
	    /***************************************
	    * 实验指导语
	    ***************************************/
	    var instructions = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus: `
	          <p>感谢您提供相关的人口统计信息。</p>
	          <p>现在您可以开始正式实验了。</p>
	          <p>您将看到来自不同艺术家、风格和艺术时期的艺术作品图像。</p>
	          <p>点击"继续"查看一组示例图像。</p>
	        `,
	        choices: ["继续"],
	        data: {
	            test_part: 'instructions'
	        } 
	    };
	    let example_imgs = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus: '<img src="img/example_imgs2.jpg">',
	        choices: ['继续'],
	        data: {
	            test_part: 'examples'
	        } 
	    };
	    let instructions2 = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus: `
	          <p>在本实验中，您将看到艺术作品的图像。</p>
	          <p>您需要通过拖动滑块来评价所显示图像的美学程度。</p>
	          <p>您可以花任意时间来评价图像，但请尽量跟随您的直觉。</p>
	          <p>在对图像进行美学评分时，请考虑以下方面：</p>
	          图像有多<b>美</b>，您有多<b>喜欢</b>它、<b>偏好</b>它以及被它<b>吸引</b>的程度。
	          <p>点击"继续"查看示例试次。</p>
	        `,
	        choices : ['继续']
	    };
	    /***************************************
	    * 示例试次
	    ***************************************/
	    let example_trial = {
	        type: jsPsychImageSliderResponse,
	        stimulus: 'img/example_trial2.jpg',
	        labels: ['非常不美', '不美', '略微不美', '中性', '略微美', '美', '非常美'],
	        prompt: "<p>您觉得这张图像有多美？</p><p>请考虑图像有多<strong>美</strong>，您有多<strong>喜欢</strong>它、<strong>偏好</strong>它以及被它<strong>吸引</strong>的程度。</p>",
	        stimulus_height:550,
	        maintain_aspect_ratio:true,
	        slider_width: 800,
	        require_movement:true
	    };
	    /***************************************
	    * 正式实验开始提示
	    ***************************************/
	    let instructions3 = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus: `
	          <p>正式实验现在开始。</p>
	          <p>本实验共有480张图像，在评价完前240张图像后，您会收到休息提示。</p>
	          <p>不过，您可以在任何时候暂停，只需暂时不点击"继续"按钮即可。</p>
	          <p><p>请在休息后继续评价剩余图像。</p>
	          <p>点击"继续"开始。</p>
	        `,
	        choices: ['继续']
	    };
	    /***************************************
	    * 实验试次定义
	    ***************************************/
	    var ratings_seq = 0;
	    var current_trial_num = 0;
	    var trial = {
	        type: jsPsychImageSliderResponse,
	        stimulus: jsPsych.timelineVariable('stimuli'),
	        labels: ['非常不美', '不美', '略微不美', '中性', '略微美', '美', '非常美'],
	        prompt: "<p>您觉得这张图像有多美？</p><p>请考虑图像有多<strong>美</strong>，您有多<strong>喜欢</strong>它、<strong>偏好</strong>它以及被它<strong>吸引</strong>的程度。</p>",
	        require_movement:true,
	        slider_width: 800,
	        data: {
	            filename: jsPsych.timelineVariable('filename'),
	            image_id: jsPsych.timelineVariable('image_id')
	        },
	        on_finish: function(data) {
	            current_trial_num++;
	            data.trial_index = current_trial_num;
	        }
	    };
	    /***************************************
	    * 创建评分块（每个块2张图片）
	    ***************************************/
	    const ntrials_perblock = 240;
	    function create_ratings_block(index){
	      var preload_images = {
	        type: jsPsychPreload,
	        message: "请等待实验图片加载完成：",
	        show_progress_bar: false,
	        continue_after_error: true,
	        // 修复：移除多余的数组嵌套 []，slice 已返回数组
	        images: images_to_load.slice(ntrials_perblock*(index-1), ntrials_perblock*index)
	      }
	      var stimuli_block = stimuli.slice(ntrials_perblock*(index-1), ntrials_perblock*index)
	      var ratings_block = {
	        timeline: [trial],
	        timeline_variables: stimuli_block,
	        data: { test_part: 'ratings', block_id: index}
	      }
	      return [preload_images, ratings_block]
	    }
	    /***************************************
	    * 休息及识别度问卷
	    ***************************************/
	    let no_known_1 = {
	        type: jsPsychSurveyMultiChoice,
	        questions: [{prompt: "您评分的图像中，有多少是您认识的？", name: "imgs_known", options: ["没有", "1-10张", "11-25张", "超过25张"], required:true}],
	    };
	    let break_instruction = {
	        type: jsPsychHtmlButtonResponse,
	        stimulus: `<p>您现在可以休息一下。</p><p>准备继续时，请点击"继续"按钮。</p>`,
	        choices : ['继续']
	    };
	    let no_known_2 = {
	        type: jsPsychSurveyMultiChoice,
	        questions: [{prompt: "您评分的图像中，有多少是您认识的？", name: "imgs_known", options: ["没有", "1-10张", "11-25张", "超过25张"], required:true}],
	    };
	    /***************************************
	    * 问卷部分
	    ***************************************/
	    var toquestionnaires = {
	      type: jsPsychHtmlButtonResponse,        
	      choices: ["<b>继续 &#10132;</b>"],
	      stimulus: "<div style='word-wrap: break-word; width: 900px'>感谢您完成评分！</br></br> 现在请您完成两个简短的问卷。<b>请认真完成。</b>这对于确保研究结果可用于科学研究非常重要。</br></br></div>",
	      data: {
	        test_part: 'instructions'
	      }
	    };
	    /***************************************
	    * 技术问题反馈
	    ***************************************/
	    var issues = {
	      type: jsPsychSurveyHtmlForm,
	      button_label: '继续',
	      html: '<div style="word-wrap: break-word; width: 900px; text-align:left;"><p>您在参与过程中是否遇到任何技术问题，或者对您的参与或研究有任何其他意见？如果有，请在此说明：</p><textarea id="get_issues" name="get_issues" cols="120" rows="20"></textarea></div>',
	      data: {
	            test_part: 'issues'
	      } 
	    };
	    /***************************************
	    * 记录实验结束时间
	    ***************************************/
	    const addEndTime = {
	        type: jsPsychCallFunction,
	        func: function() {
	          const experiment_end = new Date();
	          const duration_ms = experiment_end - experiment_start;
	          const duration_min = (duration_ms / 60000).toFixed(2);
	          jsPsych.data.addProperties({
	            end_date: experiment_end.toLocaleDateString(),
	            end_time: experiment_end.toLocaleTimeString(),
	            end_iso: toBeijingISOString(experiment_end),
	            duration_minutes: duration_min
	          });
	        }
	    };
	    /***************************************
	    * 实验结束及数据保存
	    ***************************************/
	    const save_data_trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
                <p>感谢您的时间和参与！</p>
                <p>实验数据正在自动保存...</p></br></br>
                <p style="color:red; font-size:28px; font-weight:bold;">
                    请允许浏览器下载多个文件，确认下载两个文件，例如\u201C002_ratings.csv\u201D和\u201C002_pp_info.csv\u201D后，点击\u201C确认已下载\u201D。
                </p>
                <div id="download-confirm-area" style="margin-top:25px;">
                    <button id="confirm-download-btn" style="padding:12px 40px;font-size:16px;cursor:pointer;background:#4a90d9;color:#fff;border:none;border-radius:5px;">确认已下载</button>
                </div>
                <div id="completion-area" style="display:none; margin-top:20px;"></div>
                <p id="save-status" style="color:#666;font-size:14px;margin-top:10px;"></p>`,
        choices: [],
        data: {
            test_part: 'end',
            exp_interaction: exp_interaction,
        },
        on_load: function() {
            setTimeout(saveExperimentData, 100);
            var confirmBtn = document.getElementById('confirm-download-btn');
            if (confirmBtn) {
                confirmBtn.addEventListener('click', function() {
                    document.getElementById('download-confirm-area').style.display = 'none';
                    var ca = document.getElementById('completion-area');
                    var finishBtn = document.createElement('button');
                    finishBtn.className = 'jspsych-btn';
                    finishBtn.textContent = '完成';
                    finishBtn.addEventListener('click', function() {
                        jsPsych.finishTrial();
                    });
                    ca.appendChild(finishBtn);
                    ca.style.display = 'block';
                });
            }
        }
    };	    /***************************************
	    * 数据保存函数
	    ***************************************/
	    function saveExperimentData() {
	        var sid = (subject_id || "").toString().padStart(3, "0");
	        var allData = jsPsych.data.get().values();
	        // ---- ratings CSV ----
	        var h = ["id","block_id","trial_index","stimulus","image_id","rt","response"];
	        var ratingsRows = [h];
	        for (var i = 0; i < allData.length; i++) {
	            var d = allData[i];
	            if (d.test_part === "ratings") {
	                ratingsRows.push([sid, d.block_id, d.trial_index, d.filename, d.image_id, d.rt, d.response]);
	            }
	        }
	        var ratingsCsv = ratingsRows.map(function(r) { return r.join(","); }).join("\n");
	        // ---- participant info CSV ----
	        function fv(arr, key) {
	            for (var i = 0; i < arr.length; i++) {
	                if (arr[i].test_part === key) return arr[i];
	            }
	            return {};
	        }
	        var demo = fv(allData, "demographics");
	        var demoResp = demo.response || {};
	        var vastrAll = allData.filter(function(d) { return d.test_part === "vast-r"; });
	        var vaiakAll = allData.filter(function(d) { return d.test_part && d.test_part.indexOf("vaiak") === 0; });
	        var knownData = allData.filter(function(d) { return d.response && d.response.imgs_known !== undefined; });
	        var issuesObj = fv(allData, "issues");
	        var issuesVal = "";
	        if (issuesObj.response) {
	            issuesVal = typeof issuesObj.response === "string" ? issuesObj.response : JSON.stringify(issuesObj.response);
	        }
	        // ---- collect individual responses ----
	        var vastrResp = [];
	        for (var vi = 0; vi < vastrAll.length; vi++) {
	            var v = vastrAll[vi];
	            vastrResp.push({trial: v.trial_number, img: v.image_number, resp: v.response});
	        }
	        var vastrRespStr = JSON.stringify(vastrResp);
	        var vaiakResp = [];
	        for (var vi = 0; vi < vaiakAll.length; vi++) {
	            var v = vaiakAll[vi];
	            vaiakResp.push({part: v.test_part, resp: v.response});
	        }
	        var vaiakRespStr = JSON.stringify(vaiakResp);
	        var ppHeader = ["id","start_iso","end_iso","duration_minutes",
	            "age","gender","province","native_language","education","current_occupation","visual_impairments",
	            "art_history_education","art_history_education_1_years","art_history_education_2_years","art_history_education_2_history_course","art_history_education_3_years",
	            "art_conservation","art_conservation_education_1_years","art_conservation_education_2_years","art_conservation_education_2_history_course","art_conservation_education_3_years",
	            "imgs_known1","imgs_known2",
	            
	            "vastr_individual","vaiak_individual",
	            "issues"].join(",");
	        var ppRow = [
	            sid,
	            allData.length > 0 ? allData[0].start_iso || "" : "",
	            (function(){var n=new Date();return toBeijingISOString(n);})(),
	            (function(){if(allData.length>0&&allData[0].start_iso){var d=(Date.now()-new Date(allData[0].start_iso).getTime())/60000;if(!isNaN(d))return d.toFixed(2);return"";}})(),
	            demoResp.age || "", demoResp.gender || "", demoResp.province || "", demoResp.native_language || "", demoResp.education || "", demoResp.current_occupation || "", demoResp.visual_impairments || "",
	            demoResp.art_history_education || "", demoResp.art_history_education_1_years || "", demoResp.art_history_education_2_years || "", demoResp.art_history_education_2_history_course || "", demoResp.art_history_education_3_years || "",
	            demoResp.art_conservation || "", demoResp.art_conservation_education_1_years || "", demoResp.art_conservation_education_2_years || "", demoResp.art_conservation_education_2_history_course || "", demoResp.art_conservation_education_3_years || "",
	            knownData.length > 0 ? knownData[0].response.imgs_known : "",
	            knownData.length > 1 ? knownData[1].response.imgs_known : "",
	            vastrRespStr,
	            vaiakRespStr,
	            issuesVal
	        ].join(",");
	        var ppCsv = ppHeader + "\n" + ppRow;
	        // ---- download ----
	        // 分批下载，避免浏览器卡死
	        function dlOne(content, name, cb) {
	            setTimeout(function() {
	                var b = new Blob(["\uFEFF" + content], {type: "text/csv;charset=utf-8;"});
	                var url = URL.createObjectURL(b);
	                var a = document.createElement("a"); a.href = url; a.download = name;
	                document.body.appendChild(a); a.click(); document.body.removeChild(a);
	                setTimeout(function() { URL.revokeObjectURL(url); if (cb) cb(); }, 100);
	            }, 50);
	        }
	        var st = document.getElementById("save-status");
	        if (st) st.textContent = "正在保存第1个文件...";
	        dlOne(ratingsCsv, sid + "_ratings.csv", function() {
	            if (st) st.textContent = "正在保存第2个文件...";
	            dlOne(ppCsv, sid + "_pp_info.csv", function() {
	                if (st) st.textContent = "保存完成！";
	            });
	        });
	    }
	    /***************************************
	    * 构建并运行完整实验
	    ***************************************/
	    function buildAndRunFullExperiment() {
	      var fullTimeline = [];
	      // ===== 欢迎与引导部分 =====
	      fullTimeline.push(
	        welcome,
	        consent,
	        browsercheck,
	        createPreloadBlock(),
	        enter_fullscreen,
	        DEMOGRAPHICS.getSurvey(),
	        resize,
	        instructions,
	        example_imgs,
	        instructions2,
	        example_trial,
	        instructions3
	      );
	      // ===== 正式评分块(完整480张，中间休息) =====
	      var total_blocks = Math.ceil(stimuli.length / ntrials_perblock);
	      var half_blocks = Math.ceil(total_blocks / 2);
	      for (var i = 1; i <= half_blocks; i++) {
	        fullTimeline.push(...create_ratings_block(i));
	      }
	      fullTimeline.push(no_known_1);
	      fullTimeline.push(break_instruction);
	      for (var j = half_blocks + 1; j <= total_blocks; j++) {
	        fullTimeline.push(...create_ratings_block(j));
	      }
	      fullTimeline.push(no_known_2);
	      // ===== 问卷部分 =====
	      fullTimeline.push(toquestionnaires);
	      // ----- VAST-R 问卷初始化 -----
	      let vastr = new VastR("zh", "images/vastr");
	      let preload_VASTR = {
	        type: jsPsychPreload,
	        message: "请等待问卷图片加载完成：",
	        images: vastr.getImageSources()
	      };
	      let vastr_instructions = vastr.getjsPsychInstructions();
	      let vastr_trials = vastr.getjsPsychImageButtonResponseTrials();
	      fullTimeline.push(preload_VASTR);
	      if (Array.isArray(vastr_instructions)) {
	        fullTimeline.push(...vastr_instructions);
	      } else {
	        fullTimeline.push(vastr_instructions);
	      }
	      if (Array.isArray(vastr_trials)) {
	        fullTimeline.push(...vastr_trials);
	      } else {
	        fullTimeline.push(vastr_trials);
	      }
	      // ----- 取消缩放 -----
	      const unscale = {
	          type: jsPsychCallFunction,
	          func: function() {
	              document.getElementById("jspsych-content").style.transform = "scale(" + 1 + ")";
	          }
	      };
	      fullTimeline.push(unscale);
	      // ----- VAIAK 问卷初始化 -----
	      let preload_VAIAK = {
	        type: jsPsychPreload,
	        message: "请等待问卷图片加载完成：",
	        images: Vaiak.getPreloadImages()
	      };
	      let vaiak_trials = Vaiak.getTrials();
	      fullTimeline.push(preload_VAIAK);
	      if (Array.isArray(vaiak_trials)) {
	        fullTimeline.push(...vaiak_trials);
	      } else {
	        fullTimeline.push(vaiak_trials);
	      }
	      // ----- 结束部分 -----
	      fullTimeline.push(
	        issues,
	        exit_fullscreen,
	        addEndTime,
	        save_data_trial
	      );
	      setTimeout(function() {
	          jsPsych.run(fullTimeline);
	      }, 0);
	    }
	  </script>
